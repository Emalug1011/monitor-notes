name: Monitor de Notas USAC

on:
  schedule:
    - cron: "*/10 * * * *"   # cada 30 minutos
  workflow_dispatch:           # ejecución manual desde GitHub

jobs:
  check:
    runs-on: ubuntu-latest
    environment: NotiSecrets

    permissions:
      contents: write          # necesario para hacer commit de state.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests pdfplumber

      - name: Ejecutar monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_notas.py

      - name: Guardar state.json en el repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update state.json [skip ci]"
          git push
